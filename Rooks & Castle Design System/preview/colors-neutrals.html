<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg); margin: 0; padding: 20px; font-family: var(--font-body); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 90px; border-radius: 10px; overflow: hidden; border: 1px solid var(--color-border); }
  .color-block { height: 72px; }
  .info { padding: 10px 12px; background: var(--color-surface); }
  .name { font-size: 11px; font-weight: 600; color: var(--color-text-primary); font-family: var(--font-accent); letter-spacing: 0.05em; text-transform: uppercase; }
  .hex { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; font-family: monospace; }
  .label { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }
</style>
</head><body>
<div class="row">
  <div class="swatch">
    <div class="color-block" style="background:#0F0F0F"></div>
    <div class="info"><div class="name">BG</div><div class="hex">#0F0F0F</div><div class="label">Page background</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#1A1A1A"></div>
    <div class="info"><div class="name">Surface</div><div class="hex">#1A1A1A</div><div class="label">Cards / sections</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#222222"></div>
    <div class="info"><div class="name">Surface 2</div><div class="hex">#222222</div><div class="label">Nested / inputs</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#2A2A2A"></div>
    <div class="info"><div class="name">Border</div><div class="hex">#2A2A2A</div><div class="label">Subtle dividers</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:rgba(255,255,255,0.08)"></div>
    <div class="info"><div class="name">Glass Border</div><div class="hex">rgba(255,255,255,0.08)</div><div class="label">Glass elements</div></div>
  </div>
</div>
</body></html>
