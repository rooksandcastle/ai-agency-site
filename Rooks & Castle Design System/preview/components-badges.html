<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg); margin: 0; padding: 24px 28px; font-family: var(--font-body); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .label { font-family: var(--font-accent); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-green); margin-bottom: 10px; }
  hr { border: none; border-top: 1px solid var(--color-border); margin: 14px 0; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 9999px; font-family: var(--font-accent); font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head><body>
  <div class="label">Badges</div>
  <div class="row">
    <span class="badge">AI Consulting</span>
    <span class="badge">New</span>
    <span class="badge">Property</span>
  </div>
  <hr>
  <div class="label">Status Pills</div>
  <div class="row">
    <span class="pill" style="background:rgba(16,185,129,0.12);color:#34D399;border:1px solid rgba(16,185,129,0.25)">
      <span class="dot" style="background:#34D399"></span>Active
    </span>
    <span class="pill" style="background:rgba(245,158,11,0.12);color:#FDE68A;border:1px solid rgba(245,158,11,0.25)">
      <span class="dot" style="background:#F59E0B"></span>Processing
    </span>
    <span class="pill" style="background:rgba(107,114,128,0.12);color:#9CA3AF;border:1px solid rgba(107,114,128,0.25)">
      <span class="dot" style="background:#6B7280"></span>Inactive
    </span>
  </div>
  <hr>
  <div class="label">Hero Label</div>
  <div class="row">
    <span style="display:inline-flex;align-items:center;padding:8px 20px;background:linear-gradient(90deg,rgba(16,185,129,0.1),rgba(52,211,153,0.08));border:1px solid rgba(255,255,255,0.15);border-radius:9999px;font-size:13px;font-weight:500;color:#F9FAFB;backdrop-filter:blur(10px)">Out-of-Hours Phone Coverage for Your Business</span>
  </div>
</body></html>
