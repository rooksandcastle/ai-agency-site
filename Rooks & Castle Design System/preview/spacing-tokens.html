<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg); margin: 0; padding: 20px; font-family: var(--font-body); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .item { display: flex; flex-direction: column; gap: 6px; }
  .bar-wrap { height: 40px; display: flex; align-items: flex-end; }
  .bar { background: var(--color-green); border-radius: 3px; height: 100%; opacity: 0.8; }
  .name { font-family: monospace; font-size: 10px; color: var(--color-text-secondary); }
  .val { font-family: monospace; font-size: 10px; color: var(--color-text-tertiary); }
</style>
</head><body>
<div class="grid">
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:4px;height:10%"></div></div><div class="name">--space-1</div><div class="val">4px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:8px;height:20%"></div></div><div class="name">--space-2</div><div class="val">8px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:12px;height:30%"></div></div><div class="name">--space-3</div><div class="val">12px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:16px;height:40%"></div></div><div class="name">--space-4</div><div class="val">16px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:20px;height:50%"></div></div><div class="name">--space-5</div><div class="val">20px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:24px;height:60%"></div></div><div class="name">--space-6</div><div class="val">24px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:32px;height:70%"></div></div><div class="name">--space-8</div><div class="val">32px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:40px;height:80%"></div></div><div class="name">--space-10</div><div class="val">40px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:48px;height:90%"></div></div><div class="name">--space-12</div><div class="val">48px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:64px;height:100%"></div></div><div class="name">--space-16</div><div class="val">64px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:80px;height:100%;opacity:0.5"></div></div><div class="name">--space-20</div><div class="val">80px</div></div>
  <div class="item"><div class="bar-wrap"><div class="bar" style="width:96px;height:100%;opacity:0.3"></div></div><div class="name">--space-24</div><div class="val">96px</div></div>
</div>
</body></html>
