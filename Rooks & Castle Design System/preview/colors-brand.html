<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg); margin: 0; padding: 20px; font-family: var(--font-body); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .swatch { flex: 1; min-width: 100px; border-radius: 10px; overflow: hidden; }
  .color-block { height: 80px; }
  .info { padding: 10px 12px; background: var(--color-surface); }
  .name { font-size: 11px; font-weight: 600; color: var(--color-text-primary); font-family: var(--font-accent); letter-spacing: 0.05em; text-transform: uppercase; }
  .hex { font-size: 11px; color: var(--color-text-tertiary); margin-top: 2px; font-family: monospace; }
  .label { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }
</style>
</head><body>
<div class="row">
  <div class="swatch">
    <div class="color-block" style="background:#10B981;box-shadow:0 0 20px rgba(16,185,129,0.4)"></div>
    <div class="info"><div class="name">Green</div><div class="hex">#10B981</div><div class="label">Primary CTA</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#34D399"></div>
    <div class="info"><div class="name">Green Light</div><div class="hex">#34D399</div><div class="label">Hover state</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#059669"></div>
    <div class="info"><div class="name">Green Dark</div><div class="hex">#059669</div><div class="label">Pressed state</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#2E7D52"></div>
    <div class="info"><div class="name">Green Email</div><div class="hex">#2E7D52</div><div class="label">Signature / secondary</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.25)"></div>
    <div class="info"><div class="name">Green Glow</div><div class="hex">rgba(16,185,129,0.25)</div><div class="label">Ambient / glow</div></div>
  </div>
</div>
</body></html>
