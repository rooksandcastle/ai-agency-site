<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg); margin: 0; padding: 24px 28px; }
  .row { display: flex; flex-direction: column; gap: 18px; }
  .meta { font-size: 10px; color: var(--color-text-tertiary); font-family: monospace; margin-top: 4px; }
  hr { border: none; border-top: 1px solid var(--color-border); margin: 4px 0 10px; }
</style>
</head><body>
<div class="row">
  <div>
    <div class="t-label">AI Consulting</div>
    <div class="meta">Montserrat / 600 / 10px / 0.12em / uppercase — section labels</div>
  </div>
  <hr>
  <div>
    <div style="font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-secondary);">New Feature</div>
    <div class="meta">Manrope / 700 / 11px / 0.08em — nav items, small UI labels</div>
  </div>
  <hr>
  <div>
    <div style="font-family:monospace;font-size:13px;color:var(--color-green);background:rgba(16,185,129,0.08);padding:4px 10px;border-radius:4px;display:inline-block;">24/7 coverage active</div>
    <div class="meta">Monospace — code / status values</div>
  </div>
  <hr>
  <div>
    <div style="font-family:'Manrope',sans-serif;font-size:12px;font-weight:400;color:var(--color-text-tertiary);">Last updated 3 minutes ago · AI Front Desk</div>
    <div class="meta">Manrope / 400 / 12px — captions, metadata, timestamps</div>
  </div>
</div>
</body></html>
