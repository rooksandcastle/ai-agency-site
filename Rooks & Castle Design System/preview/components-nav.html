<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--color-bg); margin: 0; padding: 0; font-family: var(--font-body); }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: rgba(15,15,15,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-img { width: 48px; height: 48px; object-fit: contain; background: rgba(15,15,15,0.85); border-radius: 6px; }
  .logo-text { font-size: 15px; font-weight: 700; color: var(--color-text-primary); letter-spacing: -0.01em; font-family: 'Manrope', sans-serif; }
  .links { display: flex; gap: 28px; list-style: none; margin: 0; padding: 0; }
  .links a { font-size: 14px; font-weight: 500; color: var(--color-text-secondary); text-decoration: none; transition: color 0.2s; }
  .links a:hover, .links a.active { color: var(--color-text-primary); }
  .links a.active { color: var(--color-green); }
  .actions { display: flex; gap: 10px; align-items: center; }
</style>
</head><body>
  <nav>
    <div class="logo">
      <img class="logo-img" src="../assets/rc-logo-mark.png" alt="RC">
      <span class="logo-text">Rooks &amp; Castle</span>
    </div>
    <ul class="links">
      <li><a href="#" class="active">Services</a></li>
      <li><a href="#">How it works</a></li>
      <li><a href="#">Industries</a></li>
      <li><a href="#">About</a></li>
    </ul>
    <div class="actions">
      <button class="btn-outline" style="padding:8px 16px;font-size:13px;border-radius:8px">Sign in</button>
      <button class="btn-primary" style="padding:8px 16px;font-size:13px;border-radius:8px">Book a call</button>
    </div>
  </nav>
</body></html>
